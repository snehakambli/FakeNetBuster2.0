general:
  seed: 42
  device: "cuda"  # "cpu" if no GPU
  num_workers: 4
  pin_memory: true
  save_best_only: true
  early_stopping_patience: 10

augmentation:
  image:
    horizontal_flip: true
    vertical_flip: false
    rotation: 15
    brightness: 0.2
    contrast: 0.2
    normalize_mean: [0.485, 0.456, 0.406]
    normalize_std: [0.229, 0.224, 0.225]
  video:
    temporal_jitter: true
    frame_drop_prob: 0.1
  audio:
    time_stretch: true
    pitch_shift: true
    add_noise: true

optimizer:
  type: "adam"
  weight_decay: 0.0001
  scheduler: "cosine"
  warmup_epochs: 3

logging:
  log_dir: "logs/"
  tensorboard: true
  log_interval: 10
